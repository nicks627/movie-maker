<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1920" height="1080" fill="#101D33"/>
  <text x="180" y="170" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="82" font-weight="900">グローバル化の終焉</text>
  <text x="180" y="250" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="40" font-weight="700">コストと効率から、国家の生存と抑止へ</text>
  <rect x="180" y="340" width="1560" height="480" rx="42" fill="#0F172A" stroke="#334155" stroke-width="3"/>
  <circle cx="520" cy="580" r="74" fill="#EF4444"/>
  <circle cx="960" cy="580" r="74" fill="#38BDF8"/>
  <circle cx="1400" cy="580" r="74" fill="#22C55E"/>
  <text x="430" y="520" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="800">旧世界</text>
  <text x="400" y="656" fill="#FCA5A5" font-family="Arial, sans-serif" font-size="24" font-weight="700">最安 / 最速 / 最適化</text>
  <text x="882" y="520" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="800">転換点</text>
  <text x="828" y="656" fill="#7DD3FC" font-family="Arial, sans-serif" font-size="24" font-weight="700">台湾 / 規制 / 再誘致</text>
  <text x="1322" y="520" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="800">新世界</text>
  <text x="1272" y="656" fill="#86EFAC" font-family="Arial, sans-serif" font-size="24" font-weight="700">経済安全保障 / 冗長化</text>
  <text x="180" y="930" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="46" font-weight="800">半導体は、景気敏感株ではない。国家ブロックの境界線そのものになった。</text>
