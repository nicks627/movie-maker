  <text x="394" y="570" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">Food stress</text>
  <text x="358" y="624" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28">mast failure</text>
  <text x="350" y="664" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28">nut shortage</text>
  <text x="846" y="426" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">Forest stress</text>
  <text x="820" y="480" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28">oak decline</text>
  <text x="794" y="520" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28">nara disease</text>
  <text x="1266" y="570" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">Longer season</text>
  <text x="1224" y="624" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28">warm autumn</text>
  <text x="1208" y="664" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="28">late den entry</text>
  <path d="M682 536 C760 500 818 482 882 470" fill="none" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" />
  <path d="M1038 470 C1100 482 1162 500 1238 536" fill="none" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" />
  <path d="M804 726 C892 758 1024 758 1112 726" fill="none" stroke="#fb7185" stroke-width="10" stroke-linecap="round" />
  <rect x="660" y="772" width="602" height="148" rx="20" fill="#111827" stroke="#334155" />
