<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#101827" />
  <rect x="80" y="80" width="1760" height="920" rx="28" fill="#0d1623" stroke="#334155" stroke-width="2" />
  <text x="120" y="164" fill="#f8fafc" font-family="Arial, sans-serif" font-size="66" font-weight="700">Ecology stacked the odds.</text>
  <text x="120" y="224" fill="#94a3b8" font-family="Arial, sans-serif" font-size="32">Food failure, forest stress, and warmer seasons pushed movement outward.</text>
  <circle cx="530" cy="604" r="230" fill="#17311e" stroke="#3f6212" stroke-width="6" />
  <circle cx="960" cy="460" r="230" fill="#1e293b" stroke="#64748b" stroke-width="6" />
