<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1920" height="1080" fill="#0B1220"/>
  <text x="160" y="140" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="62" font-weight="800">レガシー半導体は地味だが止められない</text>
  <text x="160" y="194" fill="#94A3B8" font-family="Arial, sans-serif" font-size="28" font-weight="600">28nm 以降の成熟ノードが、自動車・家電・産業機械の土台を握る</text>
  <rect x="160" y="280" width="1600" height="560" rx="34" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <rect x="240" y="370" width="260" height="220" rx="28" fill="#111827" stroke="#F59E0B" stroke-width="3"/>
  <rect x="560" y="370" width="260" height="220" rx="28" fill="#111827" stroke="#38BDF8" stroke-width="3"/>
  <rect x="880" y="370" width="260" height="220" rx="28" fill="#111827" stroke="#22C55E" stroke-width="3"/>
  <rect x="1200" y="370" width="260" height="220" rx="28" fill="#111827" stroke="#A855F7" stroke-width="3"/>
  <rect x="1520" y="370" width="160" height="220" rx="28" fill="#111827" stroke="#EF4444" stroke-width="3"/>
  <text x="300" y="450" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="800">自動車</text>
  <text x="620" y="450" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="800">家電</text>
  <text x="940" y="450" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="800">産業機械</text>
  <text x="1250" y="450" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="800">電力 / 通信</text>
  <text x="1552" y="450" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="800">軍需</text>
  <circle cx="960" cy="720" r="148" fill="#111827" stroke="#EF4444" stroke-width="4"/>
  <text x="900" y="705" fill="#F87171" font-family="Arial, sans-serif" font-size="28" font-weight="700">価格</text>
  <text x="870" y="748" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="54" font-weight="800">数量支配</text>
  <text x="160" y="930" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="34" font-weight="700">先端だけ見ていると、中国の反撃が見えなくなる。成熟ノードは、世界中の工場を止められる。</text>
